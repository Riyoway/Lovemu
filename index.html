<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lovemu</title>
    <link id="theme-css" rel="stylesheet" href="/themes/dark.css" />
  </head>
  <body>
    <header class="topbar" data-tauri-drag-region>
      <div class="brand">
        <span class="brand-title handwritten">Lovemu</span>
      </div>
      <div class="status">
        <div class="status-item" id="status-battery" title="Battery">
          <svg viewBox="0 0 24 24" class="icon"><rect x="2" y="7" width="18" height="10" rx="2" ry="2"></rect><rect x="20" y="10" width="2" height="4" rx="1"></rect><rect id="battery-level" x="4" y="9" width="14" height="6"></rect></svg>
          <span id="battery-text">--%</span>
        </div>
        <div class="status-item" id="status-controllers" title="Controllers">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 -960 960 960" aria-hidden="true" fill="currentColor">
            <path d="M189-160q-60 0-102.5-43T42-307q0-9 1-18t3-18l84-336q14-54 57-87.5t98-33.5h390q55 0 98 33.5t57 87.5l84 336q2 9 3.5 18.5T919-306q0 61-43.5 103.5T771-160q-42 0-78-22t-54-60l-28-58q-5-10-15-15t-21-5H385q-11 0-21 5t-15 15l-28 58q-18 38-54 60t-78 22Zm3-80q19 0 34.5-10t23.5-27l28-57q15-31 44-48.5t63-17.5h190q34 0 63 18t45 48l28 57q8 17 23.5 27t34.5 10q28 0 48-18.5t21-46.5q0 1-2-19l-84-335q-7-27-28-44t-49-17H285q-28 0-49.5 17T208-659l-84 335q-2 6-2 18 0 28 20.5 47t49.5 19Zm348-280q17 0 28.5-11.5T580-560q0-17-11.5-28.5T540-600q-17 0-28.5 11.5T500-560q0 17 11.5 28.5T540-520Zm80-80q17 0 28.5-11.5T660-640q0-17-11.5-28.5T620-680q-17 0-28.5 11.5T580-640q0 17 11.5 28.5T620-600Zm0 160q17 0 28.5-11.5T660-480q0-17-11.5-28.5T620-520q-17 0-28.5 11.5T580-480q0 17 11.5 28.5T620-440Zm80-80q17 0 28.5-11.5T740-560q0-17-11.5-28.5T700-600q-17 0-28.5 11.5T660-560q0 17 11.5 28.5T700-520Zm-360 60q13 0 21.5-8.5T370-490v-40h40q13 0 21.5-8.5T440-560q0-13-8.5-21.5T410-590h-40v-40q0-13-8.5-21.5T340-660q-13 0-21.5 8.5T310-630v40h-40q-13 0-21.5 8.5T240-560q0 13 8.5 21.5T270-530h40v40q0 13 8.5 21.5T340-460Zm140-20Z"/>
          </svg>
          <span id="controller-count-header" class="badge">0</span>
        </div>
        <div class="status-item" id="status-network" title="Wi‑Fi">
          <svg viewBox="0 0 24 24" class="icon wifi-bars" aria-hidden="true">
            <rect class="bar" id="wifi-bar-1" x="4" y="15" width="3" height="5" rx="1"/>
            <rect class="bar" id="wifi-bar-2" x="9" y="13" width="3" height="7" rx="1"/>
            <rect class="bar" id="wifi-bar-3" x="14" y="11" width="3" height="9" rx="1"/>
            <rect class="bar" id="wifi-bar-4" x="19" y="9" width="3" height="11" rx="1"/>
          </svg>
          <span id="network-text">--</span>
        </div>
        <div class="status-item" id="status-volume" title="Volume">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M5 10v4h3l5 4V6l-5 4H5z"></path>
            <path id="vol-wave-1" d="M15.5 12a1.5 1.5 0 0 0 1.5 1.5 1.5 1.5 0 0 0 0-3 1.5 1.5 0 0 0-1.5 1.5Z" fill="none" stroke-width="2" stroke-linecap="round"></path>
            <path id="vol-wave-2" d="M16 9a3 3 0 0 1 0 6" fill="none" stroke-width="2" stroke-linecap="round"></path>
            <path id="vol-wave-3" d="M17 7a5 5 0 0 1 0 10" fill="none" stroke-width="2" stroke-linecap="round"></path>
          </svg>
          <span id="volume-text">--</span>
        </div>
        <div class="status-item" id="status-clock" title="Clock">
          <svg viewBox="0 0 24 24" class="icon"><circle cx="12" cy="12" r="9" fill="none" stroke-width="2"></circle><path d="M12 7v5l3 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"></path></svg>
          <span id="clock-text">--:--</span>
          <span id="date-text" class="muted">----</span>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="apps" id="apps">
      </section>
    </main>

    <div id="loading-overlay" class="overlay loading" aria-hidden="true" role="status">
      <div class="loading-box" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-text">Launching...</div>
      </div>
    </div>

    <footer class="bottombar">
      <div class="actions">
        <button class="btn" id="btn-website" aria-label="Website" title="Website">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <circle cx="12" cy="12" r="10" fill="none" stroke-width="2"></circle>
            <path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20" fill="none" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
        <button class="btn" id="btn-update" aria-label="Check Update" title="Check for Updates">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 -960 960 960" aria-hidden="true" fill="currentColor">
            <path d="M480-120q-75 0-140.5-28.5t-114-77q-48.5-48.5-77-114T120-480q0-75 28.5-140.5t77-114q48.5-48.5 114-77T480-840q82 0 155.5 35T760-706v-94h80v240H600v-80h110q-41-56-101-88t-129-32q-117 0-198.5 81.5T200-480q0 117 81.5 198.5T480-200q105 0 183.5-68T756-440h82q-15 137-117.5 228.5T480-120Zm112-192L440-464v-216h80v184l128 128-56 56Z"/>
          </svg>
        </button>
        <button class="btn" id="btn-downloader" aria-label="Downloader" title="Downloader">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 -960 960 960" aria-hidden="true" fill="currentColor">
            <path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/>
          </svg>
        </button>
        <button class="btn" id="btn-controllers" aria-label="Controllers" title="Controllers">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 -960 960 960" aria-hidden="true" fill="currentColor">
            <path d="M189-160q-60 0-102.5-43T42-307q0-9 1-18t3-18l84-336q14-54 57-87.5t98-33.5h390q55 0 98 33.5t57 87.5l84 336q2 9 3.5 18.5T919-306q0 61-43.5 103.5T771-160q-42 0-78-22t-54-60l-28-58q-5-10-15-15t-21-5H385q-11 0-21 5t-15 15l-28 58q-18 38-54 60t-78 22Zm3-80q19 0 34.5-10t23.5-27l28-57q15-31 44-48.5t63-17.5h190q34 0 63 18t45 48l28 57q8 17 23.5 27t34.5 10q28 0 48-18.5t21-46.5q0 1-2-19l-84-335q-7-27-28-44t-49-17H285q-28 0-49.5 17T208-659l-84 335q-2 6-2 18 0 28 20.5 47t49.5 19Zm348-280q17 0 28.5-11.5T580-560q0-17-11.5-28.5T540-600q-17 0-28.5 11.5T500-560q0 17 11.5 28.5T540-520Zm80-80q17 0 28.5-11.5T660-640q0-17-11.5-28.5T620-680q-17 0-28.5 11.5T580-640q0 17 11.5 28.5T620-600Zm0 160q17 0 28.5-11.5T660-480q0-17-11.5-28.5T620-520q-17 0-28.5 11.5T580-480q0 17 11.5 28.5T620-440Zm80-80q17 0 28.5-11.5T740-560q0-17-11.5-28.5T700-600q-17 0-28.5 11.5T660-560q0 17 11.5 28.5T700-520Zm-360 60q13 0 21.5-8.5T370-490v-40h40q13 0 21.5-8.5T440-560q0-13-8.5-21.5T410-590h-40v-40q0-13-8.5-21.5T340-660q-13 0-21.5 8.5T310-630v40h-40q-13 0-21.5 8.5T240-560q0 13 8.5 21.5T270-530h40v40q0 13 8.5 21.5T340-460Zm140-20Z"/>
          </svg>
        </button>
        <button class="btn" id="btn-settings" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M19.4 13.5a7.8 7.8 0 0 0 .05-3l1.76-1.02-2-3.46-1.99 1.15a7.9 7.9 0 0 0-2.6-1.5l-.3-2.3h-4l-.3 2.3a7.9 7.9 0 0 0-2.6 1.5L4.79 6.02l-2 3.46L4.55 10.5a7.8 7.8 0 0 0 .05 3l-1.76 1.02 2 3.46 1.99-1.15c.8.64 1.68 1.14 2.6 1.5l.3 2.3h4l.3-2.3c.92-.35 1.8-.86 2.6-1.5l1.99 1.15 2-3.46-1.76-1.02Z" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
        <button class="btn" id="btn-help" aria-label="Help">
          <svg viewBox="0 0 24 24" class="icon"><path d="M12 18h.01" stroke-width="2" stroke-linecap="round"></path><path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 2-3 4" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="12" cy="12" r="9" fill="none" stroke-width="2"></circle></svg>
        </button>
        <button class="btn" id="btn-fullscreen" aria-label="Console mode" title="Console mode (fullscreen)">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </button>
        <button class="btn" id="btn-exit" aria-label="Exit">
          <svg viewBox="0 0 24 24" class="icon"><path d="M16 17l5-5-5-5M21 12H9" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M13 21H5a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h8" fill="none" stroke-width="2"></path></svg>
        </button>
      </div>
    </footer>

    <div class="console-hint" aria-hidden="true">
      <span><span class="ckey">◀ ▶</span> Move</span>
      <span><span class="ckey">A</span> Launch</span>
      <span><span class="ckey">B</span> Back</span>
      <span><span class="ckey">Esc</span> Exit</span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
